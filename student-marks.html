<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grade Calculator</title>
    <style>
        body {
            font-family: Arial;
            background-color: aquamarine;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }

        .pass {
            color: green;
        }

        .fail {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>

    <input type="number" id="sub1" placeholder="Subject 1 Marks"><br>
    <input type="number" id="sub2" placeholder="Subject 2 Marks"><br>
    <input type="number" id="sub3" placeholder="Subject 3 Marks"><br>
    <input type="number" id="sub4" placeholder="Subject 4 Marks"><br>
    <input type="number" id="sub5" placeholder="Subject 5 Marks"><br>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculate() {
    let s1 = Number(document.getElementById("sub1").value);
    let s2 = Number(document.getElementById("sub2").value);
    let s3 = Number(document.getElementById("sub3").value);
    let s4 = Number(document.getElementById("sub4").value);
    let s5 = Number(document.getElementById("sub5").value);

    if (!s1 || !s2 || !s3 || !s4 || !s5) {
        document.getElementById("output").innerHTML = "Please enter all marks!";
        return;
    }

    let total = s1 + s2 + s3 + s4 + s5;
    let average = total / 5;
    let grade = "";

    if (average >= 90) grade = "A+";
    else if (average >= 80) grade = "A";
    else if (average >= 70) grade = "B";
    else if (average >= 60) grade = "C";
    else if (average >= 50) grade = "D";
    else grade = "F";

    let resultClass = average >= 50 ? "pass" : "fail";

    document.getElementById("output").innerHTML = `
        Total: ${total} <br>
        Average: ${average.toFixed(2)} <br>
        Grade: ${grade} <br>
        Result: <span class="${resultClass}">
            ${average >= 50 ? "PASS" : "FAIL"}
        </span>
    `;
}
</script>

</body>
</html>
